services:
  - type: web
    name: ai-interview-platform
    env: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MONGODB_URI
        sync: false # Set this in Render Dashboard
      - key: GEMINI_API_KEY
        sync: false # Set this in Render Dashboard
      - key: JWT_SECRET
        sync: false # Set this in Render Dashboard
      - key: FRONTEND_URL
        fromContext: instance_url
      - key: VITE_API_URL
        value: /api
